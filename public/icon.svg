<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0e0a1a"/>
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="140" fill="url(#outerGlow)" opacity="0.18"/>
  <!-- Mid glow -->
  <circle cx="256" cy="256" r="80" fill="url(#midGlow)" opacity="0.5"/>
  <!-- Core bindu -->
  <circle cx="256" cy="256" r="44" fill="url(#core)"/>
  <defs>
    <radialGradient id="outerGlow">
      <stop offset="0%" stop-color="#20d6c8"/>
      <stop offset="100%" stop-color="#20d6c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="midGlow">
      <stop offset="0%" stop-color="#24ccbf"/>
      <stop offset="100%" stop-color="#24ccbf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#7eeae0"/>
      <stop offset="100%" stop-color="#20d6c8"/>
    </radialGradient>
  </defs>
</svg>
